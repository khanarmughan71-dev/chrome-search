<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Tab</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Consolas","Courier New",monospace;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    color:#d8ffd8;

    background:
    radial-gradient(circle at center,
    #4d0000 0%,
    #220000 28%,
    #080808 68%,
    #000000 100%);

    position:relative;

}

/* ===============================
RED OVERLAY
=============================== */

body::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(255,0,0,.10),
    transparent 72%);

    pointer-events:none;

}

/* ===============================
VIGNETTE
=============================== */

body::after{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle,
    transparent 48%,
    rgba(0,0,0,.62) 100%);

    pointer-events:none;

}

/* ===============================
TOP RIGHT
=============================== */

.top-right{

    position:absolute;

    top:22px;
    right:34px;

    display:flex;
    gap:34px;

    z-index:50;

}

.top-right a{

    text-decoration:none;

    color:#00ff62;

    font-size:15px;
    font-weight:600;

    letter-spacing:.5px;

    transition:.25s;

}

.top-right a:hover{

    color:white;

    text-shadow:

    0 0 10px #00ff62,
    0 0 20px #00ff62;

}

/* ===============================
PORTFOLIO
=============================== */

.top-left{

    position:absolute;

    top:20px;
    left:30px;

    z-index:50;

}

.top-left a{

    display:flex;

    align-items:center;

    gap:14px;

    text-decoration:none;

    color:#00ff62;

    padding:10px 28px 10px 10px;

    border-radius:60px;

    background:rgba(20,20,20,.42);

    backdrop-filter:blur(18px);

    border:1px solid rgba(0,255,90,.15);

    box-shadow:
    0 0 28px rgba(255,0,0,.18);

    transition:.28s;

}

.top-left a:hover{

    transform:translateY(-3px);

    border-color:#00ff62;

    box-shadow:
    0 0 20px rgba(0,255,90,.30),
    0 0 38px rgba(255,0,0,.25);

}

.top-left img{

    width:40px;
    height:40px;

    border-radius:50%;

    object-fit:cover;

}

/* ===============================
CENTER CONTENT
=============================== */

.center-content{

    display:flex;
    flex-direction:column;
    align-items:center;

    width:100%;

    margin-top:-55px;

    z-index:5;

}

/* ===============================
LOGO
=============================== */

.logo{

    display:flex;

    align-items:center;

    gap:8px;

    margin-bottom:48px;

    color:#00ff62;

    text-shadow:

    0 0 4px rgba(0,255,98,.9),
    0 0 12px rgba(0,255,98,.45),
    0 0 28px rgba(0,255,98,.20);

}

.logo span:first-child{

    font-size:56px;
    font-weight:bold;

}

.logo span:last-child{

    font-size:52px;

    font-weight:bold;

    letter-spacing:.5px;

}

/* ===============================
SEARCH
=============================== */

.search-box{

    width:950px;

    max-width:86vw;

    height:66px;

    padding:0 42px;

    border-radius:40px;

    border:1px solid rgba(0,255,90,.16);

    outline:none;

    font-size:17px;

    color:#dedede;

    background:

    linear-gradient(
    135deg,
    rgba(255,0,0,.08),
    rgba(20,20,20,.55));

    backdrop-filter:blur(18px);

    box-shadow:

    0 0 18px rgba(255,0,0,.14),
    inset 0 0 14px rgba(255,255,255,.02);

    transition:.3s;

}

.search-box::placeholder{

    color:#b8d8bc;

}

.search-box:focus{

    border-color:#00ff62;

    box-shadow:

    0 0 24px rgba(255,0,0,.25),
    0 0 36px rgba(0,255,90,.22);

}

/* ===============================
SHORTCUTS
=============================== */

.shortcuts{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:24px;

    margin-top:48px;

}

.shortcuts a{

    text-decoration:none;

    color:#00ff62;

    min-width:150px;

    text-align:center;

    font-size:15px;

    padding:15px 30px;

    border-radius:16px;

    background:

    linear-gradient(
    180deg,
    rgba(22,22,22,.78),
    rgba(10,10,10,.96));

    border:1px solid rgba(0,255,90,.12);

    box-shadow:
    0 0 18px rgba(255,0,0,.12);

    transition:.25s;

}

.shortcuts a:hover{

    color:white;

    border-color:#00ff62;

    transform:translateY(-4px);

    background:

    linear-gradient(
    180deg,
    rgba(0,255,80,.08),
    rgba(22,22,22,.96));

    box-shadow:

    0 0 18px rgba(0,255,90,.35),
    0 0 36px rgba(255,0,0,.20);

}

</style>

</head>

<body>

<div class="top-right">

    <a href="https://mail.google.com" target="_blank">Gmail</a>

    <a href="https://photos.google.com" target="_blank">Photos</a>

</div>

<div class="top-left">

    <a href="https://armughankhan.pythonanywhere.com/" target="_blank">

        <img src="images/portfolio.png" alt="Portfolio">

        <span>Portfolio</span>

    </a>

</div>

<div class="center-content">

<div class="logo">

    <span>&lt;/&gt;</span>

    <span>khanarmughan.git</span>

</div>

<form id="searchForm">

<input

id="searchInput"

class="search-box"

type="text"

placeholder="Search the internet..."

autocomplete="off"

/>

</form>

<div class="shortcuts">

<a href="https://youtube.com" target="_blank">YouTube</a>

<a href="https://instagram.com/khanarmughan.git" target="_blank">Instagram</a>

<a href="https://github.com/khanarmughan71-dev" target="_blank">GitHub</a>

<a href="https://salesnest-frontend.vercel.app/" target="_blank">SalesNest</a>

</div>
<!-- ===============================
AMBIENT GLOW
=============================== -->

<div class="ambient-red"></div>
<div class="ambient-green"></div>

</div>

<style>

/* ===============================
RED GLOW
=============================== */

.ambient-red{

    position:absolute;

    width:700px;
    height:700px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(255,0,0,.16),
    transparent 72%);

    filter:blur(120px);

    z-index:-2;

    pointer-events:none;

}

/* ===============================
GREEN GLOW
=============================== */

.ambient-green{

    position:absolute;

    width:430px;
    height:430px;

    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(0,255,90,.08),
    transparent 72%);

    filter:blur(100px);

    z-index:-2;

    pointer-events:none;

}

/* ===============================
TABLET
=============================== */

@media (max-width:900px){

.center-content{

    margin-top:-30px;

}

.logo{

    flex-direction:column;

    gap:6px;

    margin-bottom:32px;

}

.logo span:first-child{

    font-size:48px;

}

.logo span:last-child{

    font-size:38px;

    text-align:center;

}

.search-box{

    width:92vw;

    height:60px;

    font-size:16px;

    padding:0 24px;

}

.shortcuts{

    width:92vw;

    gap:14px;

}

.shortcuts a{

    flex:1 1 calc(50% - 14px);

    min-width:unset;

}

.top-right{

    right:18px;

    gap:18px;

}

.top-left{

    left:18px;

}

.top-left a{

    padding:8px 18px 8px 8px;

    gap:10px;

}

.top-left img{

    width:36px;
    height:36px;

}

}

/* ===============================
MOBILE
=============================== */

@media (max-width:560px){

.logo span:first-child{

    font-size:42px;

}

.logo span:last-child{

    font-size:30px;

}

.search-box{

    height:56px;

    font-size:15px;

}

.shortcuts{

    flex-direction:column;

    width:92vw;

}

.shortcuts a{

    width:100%;

}

.top-right{

    font-size:13px;

    gap:12px;

}

.top-left a{

    padding:7px 14px 7px 7px;

}

}

</style>

<script>

document.getElementById("searchForm").addEventListener("submit",function(e){

    e.preventDefault();

    const query=document.getElementById("searchInput").value.trim();

    if(query){

        window.location.href="https://www.google.com/search?q="+encodeURIComponent(query);

    }

});

</script>

</body>
</html>
